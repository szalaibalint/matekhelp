<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#4F46E5" stroke="#6366F1" stroke-width="2"/>
  
  <!-- Mathematical symbols in white -->
  <!-- Pi symbol -->
  <text x="25" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">π</text>
  
  <!-- Plus sign -->
  <text x="47" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">+</text>
  
  <!-- Integral symbol -->
  <text x="68" y="38" font-family="Times New Roman, serif" font-size="28" font-weight="bold" fill="#ffffff">∫</text>
  
  <!-- Square root -->
  <text x="15" y="65" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">√</text>
  
  <!-- Division symbol -->
  <text x="45" y="65" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">÷</text>
  
  <!-- Sigma (summation) -->
  <text x="68" y="68" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#ffffff">Σ</text>
  
  <!-- Equals sign -->
  <text x="35" y="88" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">=</text>
</svg>
